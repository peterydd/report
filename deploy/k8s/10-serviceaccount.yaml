# =====================================================================
# ServiceAccount dedicated to the report CronJob.
# 专用 ServiceAccount，遵循最小权限原则：仅允许读写 reports 命名
# 空间下的 ConfigMap、Secret、PVC。
# =====================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: report
  namespace: report
  labels:
    app.kubernetes.io/name: report
    app.kubernetes.io/component: runtime
automountServiceAccountToken: false
