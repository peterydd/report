# =====================================================================
# SMTP credentials. Base64-encode via:
#   echo -n 'app-password' | base64
# The CronJob mounts this as envFrom so REPORT_SMTP_PASSWORD becomes
# available inside the container.
# =====================================================================
apiVersion: v1
kind: Secret
metadata:
  name: report-smtp
  namespace: report
  labels:
    app.kubernetes.io/name: report
    app.kubernetes.io/component: secret
type: Opaque
stringData:
  # The real SMTP password / 应用密码原文。Base64 编码由 Kubernetes
  # 在落 etcd 时自动完成，所以这里直接写明文即可。
  REPORT_SMTP_PASSWORD: "replace-me-with-real-app-password"
